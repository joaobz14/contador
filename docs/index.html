<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Autorização Shopee — Separador de Etiquetas</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      margin: 0; padding: 24px; background: #f4f5f7; color: #1f2937;
      display: flex; justify-content: center;
    }
    .card {
      background: #fff; border-radius: 14px; padding: 28px;
      max-width: 560px; width: 100%; box-shadow: 0 6px 24px rgba(0,0,0,.08);
      margin-top: 24px;
    }
    h1 { font-size: 20px; margin: 0 0 4px; }
    .sub { color: #6b7280; font-size: 14px; margin: 0 0 20px; }
    .campo { margin-bottom: 16px; }
    .rotulo { font-size: 13px; color: #6b7280; margin-bottom: 6px; }
    .valor-linha { display: flex; gap: 8px; }
    .valor {
      flex: 1; font-family: ui-monospace, Consolas, monospace; font-size: 16px;
      background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 8px;
      padding: 12px; word-break: break-all; user-select: all;
    }
    button {
      border: 0; border-radius: 8px; padding: 0 16px; font-size: 14px;
      background: #ee4d2d; color: #fff; cursor: pointer; white-space: nowrap;
    }
    button:active { opacity: .85; }
    .vazio { color: #9ca3af; font-style: italic; }
    .aviso {
      margin-top: 18px; font-size: 13px; color: #6b7280;
      border-top: 1px solid #eee; padding-top: 14px;
    }
    .ok { color: #0f6e56; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Autorização da Shopee</h1>
    <p class="sub">Esta página recebe o retorno da autorização. Copie os valores
      abaixo e cole no programa <strong>Separador de Etiquetas</strong>.</p>

    <div class="campo">
      <div class="rotulo">code (código de autorização)</div>
      <div class="valor-linha">
        <div class="valor" id="code"></div>
        <button onclick="copiar('code')">Copiar</button>
      </div>
    </div>

    <div class="campo">
      <div class="rotulo">shop_id (número da loja)</div>
      <div class="valor-linha">
        <div class="valor" id="shop"></div>
        <button onclick="copiar('shop')">Copiar</button>
      </div>
    </div>

    <p class="aviso" id="status"></p>
  </div>

  <script>
    function param(nome) {
      return new URLSearchParams(window.location.search).get(nome) || "";
    }
    function preencher(id, valor) {
      var el = document.getElementById(id);
      if (valor) { el.textContent = valor; }
      else { el.innerHTML = '<span class="vazio">(vazio — abra esta página pelo link de autorização da Shopee)</span>'; }
    }
    function copiar(id) {
      var txt = document.getElementById(id).textContent;
      if (!txt) return;
      navigator.clipboard.writeText(txt).then(function () {
        document.getElementById("status").innerHTML =
          '<span class="ok">Copiado!</span> Cole no programa.';
      });
    }
    var code = param("code");
    var shop = param("shop_id");
    preencher("code", code);
    preencher("shop", shop);
    if (code) {
      document.getElementById("status").innerHTML =
        '<span class="ok">Autorização recebida.</span> Copie o code e o shop_id acima.';
    } else {
      document.getElementById("status").textContent =
        "Aguardando uma autorização. Esta é a página de retorno (Redirect URL) do app.";
    }
  </script>
</body>
</html>
